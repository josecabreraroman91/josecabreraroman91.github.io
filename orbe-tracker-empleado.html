<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbe Time Tracker · Mi fichaje</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#7C6BFF; --brand-soft:rgba(124,107,255,.14);
    --ink:#EDF0F7; --surface:#FFFFFF; --surface-2:#F2F5FB;
    --border:#E3E8F1; --hair:rgba(22,32,58,.08);
    --text:#16203A; --muted:#5E6A82; --faint:#93A0B5;
    --work:#059669; --work-soft:rgba(5,150,105,.12);
    --rest:#C2790A; --rest-soft:rgba(217,119,6,.14);
    --off:#64748B; --off-soft:rgba(100,116,139,.13);
    --alert:#DC2626; --alert-soft:rgba(220,38,38,.10);
    --shadow:0 22px 48px -24px rgba(30,42,74,.30);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{
    background:radial-gradient(900px 480px at 84% -12%, rgba(124,107,255,.12), transparent 60%), linear-gradient(180deg,#EDF0F7,#E5EAF3);
    color:var(--text); font-family:Inter,system-ui,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5; min-height:100vh;
  }
  .num{font-family:'Space Grotesk',Inter,sans-serif; font-variant-numeric:tabular-nums; letter-spacing:-.01em}

  .topbar{position:sticky; top:0; z-index:40; background:rgba(255,255,255,.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--border)}
  .topbar-in{max-width:520px; margin:0 auto; padding:12px 18px; display:flex; align-items:center; gap:12px}
  .logo{display:flex; align-items:center; gap:10px; font-family:'Space Grotesk'; font-weight:600; font-size:16px; color:var(--text)}
  .logo .mark{width:24px; height:24px; border-radius:50%; position:relative; flex:none; background:linear-gradient(150deg,var(--brand),#B7A6FF); box-shadow:0 0 0 1px rgba(255,255,255,.12) inset, 0 0 14px -2px var(--brand)}
  .logo .mark::after{content:""; position:absolute; inset:0; margin:auto; width:7px; height:7px; border-radius:50%; background:#fff}
  .session{margin-left:auto; display:flex; align-items:center; gap:10px}
  .session .s-av{width:32px; height:32px; border-radius:9px; display:grid; place-items:center; font:600 13px 'Space Grotesk'; color:#0E1420; background:linear-gradient(150deg,#B7A6FF,var(--brand))}
  .session .s-name{font-size:13px; font-weight:600; line-height:1.1}
  .session .s-out{font-size:11px; color:var(--faint); background:none; border:0; cursor:pointer; padding:2px 0; text-align:left}
  .session .s-out:hover{color:var(--muted)}

  .wrap{max-width:520px; margin:0 auto; padding:24px 18px 60px}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow)}
  .emp-head{padding:20px 20px 16px; display:flex; align-items:center; gap:13px; border-bottom:1px solid var(--hair)}
  .avatar{width:44px; height:44px; border-radius:12px; flex:none; display:grid; place-items:center; font:600 16px 'Space Grotesk'; color:#0E1420; background:linear-gradient(150deg,#B7A6FF,var(--brand))}
  .emp-head .who{font-weight:600; font-size:15px}
  .emp-head .role{color:var(--faint); font-size:12.5px}
  .statuspill{margin-left:auto; display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:999px}
  .dot{width:9px; height:9px; border-radius:50%; flex:none}
  .s-work{background:var(--work-soft); color:var(--work)} .s-work .dot{background:var(--work); box-shadow:0 0 0 4px var(--work-soft)}
  .s-rest{background:var(--rest-soft); color:var(--rest)} .s-rest .dot{background:var(--rest)}
  .s-off{background:var(--off-soft); color:#475569} .s-off .dot{background:var(--off)}

  .clockwrap{padding:22px 20px 8px; text-align:center}
  .bigclock{font-family:'Space Grotesk'; font-weight:600; font-size:52px; line-height:1; letter-spacing:-.03em}
  .clock-sub{color:var(--muted); font-size:13px; margin-top:6px}
  .worked{margin-top:14px; display:inline-flex; gap:16px; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:10px 16px}
  .worked b{display:block; font:600 18px 'Space Grotesk'; font-variant-numeric:tabular-nums}
  .worked span{font-size:11px; color:var(--faint); letter-spacing:.03em}

  .actions{padding:16px 20px 6px; display:grid; gap:10px}
  .btn{font:600 15px Inter; border:0; border-radius:14px; padding:16px; cursor:pointer; transition:.15s; display:flex; align-items:center; justify-content:center; gap:10px}
  .btn:active{transform:scale(.985)}
  .btn-work{background:linear-gradient(180deg,var(--work),#22B472); color:#04231a; box-shadow:0 12px 26px -14px var(--work)}
  .btn-rest{background:var(--rest-soft); color:var(--rest); border:1px solid rgba(217,119,6,.3)}
  .btn-off{background:var(--off-soft); color:#46536B; border:1px solid var(--border)}
  .btn-ghost{background:none; color:var(--muted); border:1px solid var(--border)}

  .geo{margin:12px 20px 4px; display:flex; align-items:center; gap:12px; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:12px 14px}
  .radar{width:40px; height:40px; border-radius:50%; flex:none; position:relative; background:radial-gradient(circle,rgba(5,150,105,.22),transparent 70%); border:1px solid rgba(5,150,105,.4)}
  .radar::before{content:""; position:absolute; inset:0; margin:auto; width:8px; height:8px; border-radius:50%; background:var(--work); box-shadow:0 0 12px var(--work)}
  .radar.out{background:radial-gradient(circle,rgba(220,38,38,.2),transparent 70%); border-color:rgba(220,38,38,.45)}
  .radar.out::before{background:var(--alert); box-shadow:0 0 12px var(--alert)}
  .geo .g-main{font-weight:600; font-size:13.5px}
  .geo .g-sub{color:var(--faint); font-size:11.5px}
  .geo .g-tag{margin-left:auto; font-size:11px; font-weight:600; padding:5px 9px; border-radius:8px}
  .g-tag.ok{background:var(--work-soft); color:var(--work)}
  .g-tag.bad{background:var(--alert-soft); color:var(--alert)}

  .timeline{padding:10px 20px 22px}
  .tl-title{font:600 12px Inter; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); margin:10px 2px 12px}
  .tl-row{display:grid; grid-template-columns:20px 1fr auto; gap:12px; align-items:center; padding:9px 0; position:relative}
  .tl-row .tl-dot{width:11px; height:11px; border-radius:50%; margin-left:4px; z-index:2}
  .tl-row::before{content:""; position:absolute; left:9px; top:0; bottom:0; width:2px; background:var(--border)}
  .tl-row:first-child::before{top:50%}
  .tl-row:last-child::before{bottom:50%}
  .tl-label{font-size:13.5px; font-weight:500}
  .tl-time{font:600 13px 'Space Grotesk'; font-variant-numeric:tabular-nums; color:var(--muted)}
  .empty-tl{color:var(--faint); font-size:13px; text-align:center; padding:18px 0}

  .demo-reset{text-align:center; margin-top:14px}
  .demo-reset button{padding:9px 16px; font-size:13px}
  .foot{max-width:520px; margin:24px auto 0; padding:16px 18px; color:var(--faint); font-size:11.5px; text-align:center}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); background:#16203A; color:#fff; padding:12px 18px; border-radius:12px; font-size:13.5px; font-weight:500; box-shadow:var(--shadow); opacity:0; transition:.25s; z-index:60}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>

let emp=null, punchesToday=[], empZone=null;
function haversine(la1,lo1,la2,lo2){
  const R=6371000, toR=x=>x*Math.PI/180;
  const dLa=toR(la2-la1), dLo=toR(lo2-lo1);
  const a=Math.sin(dLa/2)**2+Math.cos(toR(la1))*Math.cos(toR(la2))*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function initials(n){return (n||'?').split(' ').slice(0,2).map(x=>x[0]||'').join('').toUpperCase()}
function pad(n){return String(n).padStart(2,'0')}
function fmt(mins){mins=Math.max(0,Math.floor(mins));return pad(Math.floor(mins/60))+':'+pad(mins%60)}
function hhmm(iso){const d=new Date(iso);return pad(d.getHours())+':'+pad(d.getMinutes())}

function currentState(){
  if(!punchesToday.length) return 'off';
  const last=punchesToday[punchesToday.length-1].type;
  if(last==='ingreso'||last==='receso_fin') return 'work';
  if(last==='receso_inicio') return 'rest';
  return 'off';
}
function computeTimes(){
  let worked=0, rest=0, lastTs=null, mode=null; const now=Date.now();
  for(const p of punchesToday){
    const ts=new Date(p.punched_at).getTime();
    if(mode==='work'&&lastTs!=null) worked+=ts-lastTs;
    if(mode==='rest'&&lastTs!=null) rest+=ts-lastTs;
    if(p.type==='ingreso'||p.type==='receso_fin') mode='work';
    else if(p.type==='receso_inicio') mode='rest';
    else if(p.type==='salida') mode='off';
    lastTs=ts;
  }
  if(mode==='work'&&lastTs!=null) worked+=now-lastTs;
  if(mode==='rest'&&lastTs!=null) rest+=now-lastTs;
  return {worked:worked/60000, rest:rest/60000};
}
const labels={ingreso:'Registró ingreso',receso_inicio:'Inició receso',receso_fin:'Volvió del receso',salida:'Registró salida'};
const colors={ingreso:'var(--work)',receso_inicio:'var(--rest)',receso_fin:'var(--work)',salida:'var(--off)'};

function render(){
  const st=currentState();
  const pill=document.getElementById('empPill'), pt=document.getElementById('empPillText');
  pill.className='statuspill '+(st==='work'?'s-work':st==='rest'?'s-rest':'s-off');
  pt.textContent=st==='work'?'Trabajando':st==='rest'?'En receso':'Fuera de jornada';
  const t=computeTimes();
  document.getElementById('workedTime').textContent=fmt(t.worked);
  document.getElementById('restTime').textContent=fmt(t.rest);
  const now=new Date();
  document.getElementById('clock').textContent=pad(now.getHours())+':'+pad(now.getMinutes());
  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const sub=document.querySelector('.clock-sub'); if(sub) sub.textContent='Hora del sistema · '+dias[now.getDay()]+' '+now.getDate()+' de '+meses[now.getMonth()];
  const box=document.getElementById('empActions'); box.innerHTML='';
  const mk=(c,txt,fn)=>{const b=document.createElement('button');b.className='btn '+c;b.innerHTML=txt;b.onclick=fn;return b};
  if(st==='off') box.appendChild(mk('btn-work','▶  Registrar ingreso',()=>punch('ingreso')));
  else if(st==='work'){box.appendChild(mk('btn-rest','❚❚  Iniciar receso',()=>punch('receso_inicio')));box.appendChild(mk('btn-off','■  Registrar salida',()=>punch('salida')))}
  else box.appendChild(mk('btn-work','▶  Volver del receso',()=>punch('receso_fin')));
  const tl=document.getElementById('tlList');
  tl.innerHTML=punchesToday.length?punchesToday.map(p=>`<div class="tl-row"><span class="tl-dot" style="background:${colors[p.type]}"></span><span class="tl-label">${labels[p.type]}</span><span class="tl-time">${hhmm(p.punched_at)}</span></div>`).join('')
    :'<div class="empty-tl">Todavía no marcaste hoy. Tocá "Registrar ingreso".</div>';
}

function getPos(){return new Promise((res)=>{ if(!navigator.geolocation) return res(null); navigator.geolocation.getCurrentPosition(p=>res(p.coords), ()=>res(null), {timeout:6000, enableHighAccuracy:true}); });}

async function punch(type){
  const coords=await getPos();
  const { data, error }=await db.functions.invoke('fichar', {
    body:{ type, latitude:coords?coords.latitude:null, longitude:coords?coords.longitude:null, accuracy_m:coords?coords.accuracy:null }
  });
  if(error){
    let m=error.message;
    try{ const j=await error.context.json(); if(j&&j.error) m=j.error; }catch(_){}
    toast('Error al fichar: '+m); return;
  }
  if(data&&data.error){ toast('Error: '+data.error); return; }
  const m={ingreso:'Ingreso registrado',receso_inicio:'Receso iniciado',receso_fin:'De vuelta al trabajo',salida:'Salida registrada'};
  const aviso = (data && data.in_zone===false && empZone) ? ' · ⚠ fuera de '+empZone.name : '';
  toast('✓ '+m[type]+aviso);
  await loadToday();
}

async function loadToday(){
  const d=new Date(); const start=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T00:00:00';
  const { data }=await db.from('punches').select('*').eq('employee_id',emp.id).gte('punched_at',start).order('punched_at');
  punchesToday=data||[]; render();
}

async function cerrarSesion(){ await db.auth.signOut(); location.href='orbe-tracker.html'; }
async function init(){
  const { data:{session} }=await db.auth.getSession();
  if(!session){ location.href='orbe-tracker.html'; return; }
  let { data:e }=await db.from('employees').select('*').eq('user_id',session.user.id).maybeSingle();
  // Si entró con Google (u otro método) y no está vinculado por user_id, lo buscamos por su email
  if(!e && session.user.email){
    const { data:byEmail }=await db.from('employees').select('*').ilike('email',session.user.email).maybeSingle();
    if(byEmail){
      // Vinculamos su cuenta (guardamos el user_id para las próximas veces)
      if(!byEmail.user_id){ await db.from('employees').update({user_id:session.user.id}).eq('id',byEmail.id); }
      e = byEmail;
    }
  }
  if(!e){ mostrarNoVinculado(session.user.email); return; }
  if(e.company_id){ const { data: comp } = await db.from('companies').select('status').eq('id', e.company_id).maybeSingle();
    if(comp && comp.status==='inactive'){ await db.auth.signOut(); mostrarAccesoPausa(); return; } }
  emp=e;
  if(e.zone_id){ const { data:z }=await db.from('zones').select('*').eq('id',e.zone_id).maybeSingle(); empZone=z; }
  const ini=initials(e.full_name);
  document.querySelector('.who').textContent=e.full_name;
  document.querySelector('.role').textContent=e.role_title||'—';
  document.querySelector('.avatar').textContent=ini;
  document.querySelector('.s-av').textContent=ini;
  document.querySelector('.s-name').textContent=e.full_name;
  const gm=document.querySelector('.geo .g-main'), gs=document.querySelector('.geo .g-sub'), gt=document.querySelector('.geo .g-tag');
  if(gm) gm.textContent = empZone ? empZone.name : 'Ubicación';
  if(gs) gs.textContent = (empZone && empZone.latitude!=null) ? ('Validamos que fiches dentro de '+(empZone.radius_m||150)+'m') : 'Se registra tu ubicación en cada marca';
  if(gt) gt.style.display='none';
  await loadToday();
  setInterval(render, 30000);
}
document.querySelectorAll('.s-out').forEach(b=>b.addEventListener('click', async ()=>{ await db.auth.signOut(); location.href='orbe-tracker.html'; }));
let tmo; function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tmo);tmo=setTimeout(()=>t.classList.remove('show'),2400)}
init();
</script>
