function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtNum(n){n=Math.round(Number(n)||0);const neg=n<0;n=Math.abs(n);let s=String(n).replace(/\B(?=(\d{3})+(?!\d))/g,'.');return (neg?'-':'')+s;}
function gs(n){return 'Gs. '+fmtNum(n);}
function digits(s){return String(s==null?'':s).replace(/[^\d]/g,'');}
/* lee los SI/NO de las columnas de imputación de Marangatú (tolera acentos y espacios) */
function esSI(v){return /^s[ií]$/i.test(String(v==null?'':v).trim());}
function fmtDate(iso){if(!iso)return '—';const p=String(iso).slice(0,10).split('-');return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):String(iso);}
const MES=['','enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function ymLargo(ym){const p=ym.split('-');return MES[parseInt(p[1],10)]+' '+p[0];}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2400);}
function norm(s){return String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function normFecha(v){
  if(v==null||v==='')return '';
  if(v instanceof Date&&!isNaN(v))return v.toISOString().slice(0,10);
  if(typeof v==='number'&&v>20000&&v<80000){const d=new Date(Math.round((v-25569)*86400*1000));return isNaN(d)?'':d.toISOString().slice(0,10);}
  let s=String(v).trim();
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  m=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if(m){let y=m[3];if(y.length===2)y='20'+y;return y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');}
  return '';
}
function normMonto(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return Math.round(v);
  let s=String(v).trim().replace(/gs\.?|₲|\s/gi,'');
  const neg=/^-|^\(/.test(s);s=s.replace(/[()\-]/g,'');
  if(/^\d{1,3}(\.\d{3})+(,\d+)?$/.test(s))s=s.replace(/\./g,'').replace(',','.');
  else if(/^\d+(,\d+)?$/.test(s))s=s.replace(',','.');
  else if(/^\d{1,3}(,\d{3})+(\.\d+)?$/.test(s))s=s.replace(/,/g,'');
  else if(!/^\d+(\.\d+)?$/.test(s))s=s.replace(/[^\d.]/g,'');
  const n=parseFloat(s)||0;return Math.round(neg?-n:n);
}
function rucBase(ruc){ruc=String(ruc==null?'':ruc).trim();const m=ruc.match(/^([0-9A-Za-z]+)[\s\-]+(\d)$/);if(m)return m[1];let b=ruc.replace(/[^0-9A-Za-z]/g,'');if(b.length>8)b=b.slice(0,-1);return b;}
function rucDV(ruc){ruc=String(ruc==null?'':ruc).trim();const m=ruc.match(/[\s\-](\d)\s*$/);if(m)return parseInt(m[1],10);const b=ruc.replace(/[^0-9A-Za-z]/g,'');if(b.length>8&&/\d/.test(b.slice(-1)))return parseInt(b.slice(-1),10);return null;}
function calcDV(base){
  let s=String(base).toUpperCase(),alfa='';
  for(let i=0;i<s.length;i++){const c=s.charCodeAt(i);alfa+=(c<48||c>57)?String(c):s[i];}
  let k=2,total=0;
  for(let i=alfa.length-1;i>=0;i--){if(k>11)k=2;total+=(alfa.charCodeAt(i)-48)*k;k++;}
  const r=total%11;return (r>1)?(11-r):0;
}

/* ============================ secciones de IVA ============================ */
function seccion(id){return S.secciones.find(s=>s.id===id);}
function ivaCredito(c){
  /* IVA crédito de una COMPRA según su sección (total/proporcional/exenta).
     Los comprobantes "No Imputar" (o que no imputan al IVA según Marangatú)
     van al REG igual, pero NO generan crédito ni suman al libro. */
  if(c.imputa&&(c.imputa.no===true||c.imputa.iva===false))return {i10:0,i5:0};
  const bruto10=Math.round((c.g10||0)/11), bruto5=Math.round((c.g5||0)/21);
  const s=seccion(c.seccionId);
  if(!s||s.trat==='total')return {i10:bruto10,i5:bruto5};
  if(s.trat==='exenta')return {i10:0,i5:0};
  const p=(s.pct||0)/100;
  return {i10:Math.round(bruto10*p),i5:Math.round(bruto5*p)};
}

/* ============================ motor de validación ============================ */
function validar(f,mesDecl){
  const flags=[];
  const base=rucBase(f.ruc),dv=rucDV(f.ruc);
  if(!base)flags.push({sev:'bad',tag:'RUC',msg:'Sin RUC. Marangatú rechaza la línea si no identifica a la contraparte.'});
  else{
    if(dv==null)flags.push({sev:'warn',tag:'DV',msg:'El RUC vino sin dígito verificador, no se puede controlar.'});
    else if(calcDV(base)!==dv)flags.push({sev:'bad',tag:'DV',msg:'El dígito verificador no corresponde (para '+base+' es '+calcDV(base)+', está cargado '+dv+').'});
    const dir=dirGet(f.ruc);
    if(dir&&dir.estado&&dir.estado.toUpperCase()!=='ACTIVO')flags.push({sev:'warn',tag:'PADRÓN',msg:'Este RUC figura '+dir.estado.toUpperCase()+' en el padrón. Confirmá antes de declarar.'});
  }
  if(!f.fecha)flags.push({sev:'bad',tag:'FECHA',msg:'Fecha vacía o en un formato que no se entiende.'});
  else{
    if(f.fecha>hoyISO())flags.push({sev:'warn',tag:'FECHA',msg:'Fecha futura ('+fmtDate(f.fecha)+'). Suele ser un dedazo.'});
    if(mesDecl&&f.fecha.slice(0,7)!==mesDecl)flags.push({sev:'warn',tag:'PERÍODO',msg:'Es de '+fmtDate(f.fecha)+' y estás declarando '+ymLargo(mesDecl)+'. ¿Va en este lote?'});
  }
  const t=digits(f.timbrado);
  if(!t)flags.push({sev:'bad',tag:'TIMBRADO',msg:'Sin número de timbrado.'});
  else if(t.length!==8)flags.push({sev:'warn',tag:'TIMBRADO',msg:'Tiene '+t.length+' dígitos y deberían ser 8.'});
  if(!f.nfac)flags.push({sev:'bad',tag:'Nº',msg:'Sin número de comprobante.'});
  else if(!/^\d{3}-\d{3}-\d{6,7}$/.test(f.nfac))flags.push({sev:'warn',tag:'Nº',msg:'"'+esc(f.nfac)+'" no tiene el formato habitual 001-001-0000001.'});
  if(f.cdc){const cd=digits(f.cdc);if(cd.length!==44)flags.push({sev:'warn',tag:'CDC',msg:'El CDC tiene '+cd.length+' dígitos y debería tener 44. Revisá que esté completo.'});}
  const g10=f.g10||0,g5=f.g5||0,ex=f.ex||0,suma=g10+g5+ex;
  if(f.tipo==='nc'){
    if(!String(f.nfacAsoc||'').trim()||!digits(f.timbAsoc))flags.push({sev:'bad',tag:'NC',msg:'Nota de crédito sin factura asociada (falta Nº o timbrado del comprobante original).'});
    if(g10>0||g5>0||ex>0)flags.push({sev:'warn',tag:'NC',msg:'NC con montos positivos: normalmente van en negativo (descuentan).'});
  }else{
    if(suma<=0&&(f.totalCol==null||f.totalCol<=0))flags.push({sev:'bad',tag:'MONTOS',msg:'Todos los montos están en cero.'});
    if(g10<0||g5<0||ex<0)flags.push({sev:'warn',tag:'MONTOS',msg:'Monto negativo en un comprobante que no es NC.'});
  }
  /* Coherencia de total: en carga manual detecta errores de tipeo (tolerancia estricta).
     En importados de Marangatú el total es oficial y los desgloses traen decimales de SIFEN,
     así que el descuadre por redondeo NO es error: solo avisamos si es grande (>50 Gs). */
  if(f.totalCol!=null&&suma>0){
    const dif=Math.abs(f.totalCol-suma);
    const importado=(f.origen==='planilla');
    if(!importado&&dif>1)flags.push({sev:'warn',tag:'TOTAL',msg:'El total ('+gs(f.totalCol)+') no coincide con gravadas + exentas ('+gs(suma)+').'});
    else if(importado&&dif>50)flags.push({sev:'warn',tag:'TOTAL',msg:'El total ('+gs(f.totalCol)+') difiere de gravadas + exentas ('+gs(suma)+') en '+gs(dif)+'. Revisá si el desglose está completo.'});
  }
  return flags;
}
function evaluar(comps,mesDecl){
  const seen={},dups={};
  comps.forEach(f=>{const k=rucBase(f.ruc)+'|'+digits(f.timbrado)+'|'+(f.nfac||'');if(seen[k])dups[k]=true;seen[k]=(seen[k]||0)+1;});
  const items=comps.map(f=>{
    const flags=validar(f,mesDecl);
    const k=rucBase(f.ruc)+'|'+digits(f.timbrado)+'|'+(f.nfac||'');
    if(dups[k])flags.push({sev:'warn',tag:'DUPLICADO',msg:'Otra fila tiene el mismo RUC, timbrado y número.'});
    const sev=flags.some(x=>x.sev==='bad')?'bad':(flags.length?'warn':'ok');
    return {f,flags,sev};
  });
  const sum={n:comps.length,g10:0,g5:0,ex:0,tot:0,iva10cred:0,iva5cred:0};
  comps.forEach(f=>{
    sum.g10+=f.g10||0;sum.g5+=f.g5||0;sum.ex+=f.ex||0;
    sum.tot+=(f.totalCol!=null?f.totalCol:((f.g10||0)+(f.g5||0)+(f.ex||0)));
    if(f.clase==='compra'){const ic=ivaCredito(f);sum.iva10cred+=ic.i10;sum.iva5cred+=ic.i5;}
  });
  return {items,sum,nBad:items.filter(r=>r.sev==='bad').length,nWarn:items.filter(r=>r.sev==='warn').length,nOk:items.filter(r=>r.sev==='ok').length};
}

/* ============================ exportación RG90 ============================ */
function lineaREG(c,clase,imputaGlobal){
  const base=rucBase(c.ruc),dv=rucDV(c.ruc);
  const g10=c.g10||0,g5=c.g5||0,ex=c.ex||0;
  const iva10=Math.round(g10/11),iva5=Math.round(g5/21);
  const total=(c.totalCol!=null&&c.totalCol!==0)?c.totalCol:(g10+g5+ex);
  /* imputación: manda la del COMPROBANTE (tal cual vino de Marangatú);
     si no la tiene (carga manual vieja), se usa la global del período */
  const imp=c.imputa||imputaGlobal||{};
  const noImp=imp.no===true||(!imp.iva&&!imp.ire&&!imp.irp);
  const F={
    tipoReg:(clase==='ventas'?'1':'2'),ruc:base,dv:(dv!=null?String(dv):''),
    nombre:(c.nombre||'').toUpperCase(),
    tipoComp:REGLAS.tipoComprobante[c.tipo==='nc'?'nc':'factura'],
    fecha:fmtDate(c.fecha),timbrado:digits(c.timbrado),nfac:c.nfac||'',
    g10:String(g10),iva10:String(iva10),g5:String(g5),iva5:String(iva5),
    ex:String(ex),total:String(total),
    condicion:(c.cond==='credito'?'2':'1'),extranjero:'N',
    imputaIVA:(!noImp&&imp.iva)?'S':'N',imputaIRE:(!noImp&&imp.ire)?'S':'N',imputaIRP:(!noImp&&imp.irp)?'S':'N',
    noImputa:noImp?'S':'N'
  };
  const campos=(clase==='ventas')?REGLAS.camposVentas:REGLAS.camposCompras;
  return campos.map(k=>F[k]!=null?F[k]:'').join('\t');
}
function generarREG(cliObj,ym,clase,imputa){
  const comps=compsDe(cliObj.id,ym).filter(c=>c.clase===(clase==='ventas'?'venta':'compra'));
  if(!comps.length)return null;
  return comps.map(c=>lineaREG(c,clase,imputa)).join('\r\n');
}

const CAMPOS=[

function autoMap(hdrs){
  const H=hdrs.map(norm);
  const find=fn=>H.findIndex(fn);
  /* busca la ÚLTIMA coincidencia (para el formato Marangatú, que trae primero
     los datos del informante/titular y después los de la contraparte) */
  const findLast=fn=>{for(let i=H.length-1;i>=0;i--){if(fn(H[i]))return i;}return -1;};
  const esInformante=x=>x.includes('informante');
  return {
    fecha:find(x=>x.includes('fecha')&&x.includes('emis'))>=0?find(x=>x.includes('fecha')&&x.includes('emis')):find(x=>x.includes('fecha')&&!x.includes('venc')&&!x.includes('registro')),
    /* RUC: el de la contraparte, NO el "RUC del Informante" */
    ruc:find(x=>(x.includes('ruc')||x.includes('identifica'))&&!esInformante(x)),
    dv:find(x=>x==='dv'||x.includes('digito verificador')),
    /* Nombre: el de la contraparte (última "razón social"), NO el del informante */
    nombre:findLast(x=>(x.includes('razon')||x.includes('nombre'))&&!esInformante(x)),
    timb:find(x=>x.includes('timbrado')&&!x.includes('asoc')),
    nfac:find(x=>(x.includes('numero')||x.includes('nro')||x.includes('nº'))&&x.includes('comprobante')&&!x.includes('asoc')&&!x.includes('timbrado')),
    cdc:find(x=>x==='cdc'||x.includes('codigo de control')||x.includes('control')),
    g10:find(x=>x.includes('10')&&(x.includes('grav')||x.includes('base')||x.includes('monto'))&&!x.includes('iva')),
    g5:find(x=>x.includes('5')&&!x.includes('10')&&!x.includes('15')&&(x.includes('grav')||x.includes('base')||x.includes('monto'))&&!x.includes('iva')),
    ex:find(x=>x.includes('exent')||(x.includes('no gravado'))),
    total:find(x=>x.includes('total')),
    impIva:find(x=>x.includes('imputa')&&x.includes('iva')),
    impIre:find(x=>x.includes('imputa')&&x.includes('ire')),
    impIrp:find(x=>x.includes('imputa')&&x.includes('irp')),
    noImp:find(x=>x.includes('no imputar')||x.includes('no imputa'))
  };
}
function leerArchivo(file){
  /* XML de factura electrónica (SIFEN): carga TODO automático, montos incluidos */
  if(/\.xml$/i.test(file.name||'')){leerXMLs([file]);return;}
  const reader=new FileReader();
  const esCSV=/\.csv$/i.test(file.name||'');
  reader.onload=function(e){
    try{
      const wb=esCSV?XLSX.read(e.target.result,{type:'string',raw:true}):XLSX.read(e.target.result,{type:'array',cellDates:true});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,defval:''});
      let hi=rows.findIndex(r=>r&&r.some(c=>c!==''&&c!=null));
      if(hi<0){toast('La planilla está vacía');return;}
      impHeaders=rows[hi].map(c=>String(c==null?'':c).trim());
      impFilas=rows.slice(hi+1).map((r,i)=>({_fila:hi+2+i,celdas:r})).filter(o=>o.celdas.some(c=>c!==''&&c!=null));
      if(!impFilas.length){toast('No encontré datos debajo de los encabezados');return;}
      impNombre=file.name;impMapa=autoMap(impHeaders);
      vista='mapear';render();
    }catch(err){toast('No pude leer el archivo. ¿Es un Excel o CSV válido?');}
  };
  if(esCSV)reader.readAsText(file);else reader.readAsArrayBuffer(file);
}

/* ============ importación de XML SIFEN (factura electrónica) ============
   El XML trae TODO: RUC, nombre, timbrado, número, fecha, CDC, montos.
   Estructura según Manual Técnico SIFEN: rDE > DE[Id=CDC] > gTimb / gDatGralOpe / gTotSub.
   ⚠ Verificar con XMLs reales: los nombres de campo siguen el MT v150.        */
function parseXMLSifen(txt){
  const doc=new DOMParser().parseFromString(txt,'text/xml');
  if(doc.querySelector('parsererror'))return {error:'XML inválido'};
  const q=sel=>{const el=doc.querySelector(sel);return el?el.textContent.trim():'';};
  const de=doc.querySelector('DE');
  const cdc=de?(de.getAttribute('Id')||''):'';
  const iTiDE=q('iTiDE');                       /* 1=factura, 5=nota de crédito */
  const esNC=(iTiDE==='5');
  const fecha=(q('dFeEmiDE')||'').slice(0,10);
  const timbrado=q('dNumTim');
  const nfac=[q('dEst'),q('dPunExp'),q('dNumDoc')].filter(Boolean).join('-');
  const rucEm=q('dRucEm'),dvEm=q('dDVEmi'),nomEm=q('dNomEmi');
  const rucRec=q('dRucRec'),dvRec=q('dDVRec'),nomRec=q('dNomRec');
  const iCond=q('iCondOpe');                    /* 1=contado, 2=crédito */
  const num=s=>Math.round(parseFloat(s)||0);
  let g10=num(q('dSub10')),g5=num(q('dSub5')),ex=num(q('dSubExe'))+num(q('dSubExo'));
  let total=num(q('dTotGralOpe'))||num(q('dTotOpe'))||((g10+g5+ex));
  if(esNC){g10=-Math.abs(g10);g5=-Math.abs(g5);ex=-Math.abs(ex);total=-Math.abs(total);}
  if(!cdc&&!rucEm)return {error:'No parece un XML de SIFEN'};
  return {cdc:digits(cdc),tipo:esNC?'nc':'factura',fecha,timbrado,nfac,
    emisor:{ruc:rucEm,dv:dvEm,nombre:nomEm},receptor:{ruc:rucRec,dv:dvRec,nombre:nomRec},
    cond:(iCond==='2')?'credito':'contado',g10,g5,ex,total};
}
function leerXMLs(files){
  const cliente=cliObj(curCli);
  if(!cliente){toast('Abrí primero el cliente al que van los comprobantes');return;}
  const rucCli=rucBase(cliente.ruc);
  let pendientes=files.length,ok=0,fallos=0;
  const secDefault=S.secciones[0]?S.secciones[0].id:null;
  Array.from(files).forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      const d=parseXMLSifen(e.target.result);
      if(d.error){fallos++;}
      else{
        /* si el emisor es el cliente → es una VENTA suya; si no → es una COMPRA */
        const esVenta=(rucBase(d.emisor.ruc)===rucCli);
        const contra=esVenta?d.receptor:d.emisor;
        const ruc=contra.ruc?(contra.ruc+(contra.dv!==''?'-'+contra.dv:'')):'';
        if(contra.nombre)dirRemember(ruc,contra.nombre,{fuente:'import',timbrado:digits(d.timbrado)||undefined,dv:contra.dv!==''?parseInt(contra.dv,10):undefined});
        S.comprobantes.push({
          id:uid(),clienteId:curCli,origen:'planilla',
          clase:esVenta?'venta':'compra',tipo:d.tipo,cond:d.cond,cuotas:[],
          fecha:d.fecha,ruc,nombre:contra.nombre,
          timbrado:d.timbrado,nfac:d.nfac,cdc:d.cdc,
          nfacAsoc:'',timbAsoc:'',
          g10:d.g10,g5:d.g5,ex:d.ex,totalCol:d.total,
          seccionId:secDefault
        });ok++;
      }
      if(--pendientes===0){
        save();
        if(ok){
          /* ajustar período al de lo importado y validar automático */
          const cnt={};S.comprobantes.filter(c=>c.clienteId===curCli).forEach(c=>{const m=(c.fecha||'').slice(0,7);if(m)cnt[m]=(cnt[m]||0)+1;});
          let mm=ymSel,mx=0;for(const m in cnt){if(cnt[m]>mx){mx=cnt[m];mm=m;}}
          ymSel=mm;perSet(curCli,ymSel,{estado:'cargado'});
          toast(ok+' XML cargados completos'+(fallos?(' · '+fallos+' no se pudieron leer'):''));
          correrValidacion();
        }else toast('No pude leer ningún XML. ¿Son facturas electrónicas de SIFEN?');
      }
    };
    r.readAsText(file);
  });
}
function firmaComp(c){
  const cdc=(c.cdc||'').replace(/\s/g,'');
  if(cdc) return (c.clase||'')+'|cdc|'+cdc;
  const timb=digits(c.timbrado||'');
  const nfac=(c.nfac||'').replace(/[\s-]/g,'');
  return (c.clase||'')+'|'+timb+'|'+nfac+'|'+(c.fecha||'');
}
function importarFilas(){
  const faltan=CAMPOS.filter(c=>c.req&&(impMapa[c.k]==null||impMapa[c.k]<0)).map(c=>c.lbl);
  if(faltan.length){toast('Falta indicar la columna de: '+faltan.join(', '));return;}
  const g=(o,k)=>{const i=impMapa[k];return (i==null||i<0)?'':o.celdas[i];};
  const secDefault=S.secciones[0]?S.secciones[0].id:null;
  let n=0,dup=0;
  const existentes=new Set(S.comprobantes.filter(c=>c.clienteId===curCli).map(firmaComp));
  impFilas.forEach(o=>{
    let ruc=String(g(o,'ruc')||'').trim();
    const dvCol=String(g(o,'dv')||'').trim();
    if(dvCol!==''&&ruc&&!/[-\s]\d$/.test(ruc))ruc=ruc+'-'+digits(dvCol);
    const nombre=String(g(o,'nombre')||'').trim();
    const timb=String(g(o,'timb')||'').trim();
    if(nombre)dirRemember(ruc,nombre,{fuente:'import',timbrado:digits(timb)||undefined});
    const comp={
      id:uid(),clienteId:curCli,_fila:o._fila,origen:'planilla',
      clase:(impClase==='ventas'?'venta':'compra'),tipo:'factura',cond:'contado',cuotas:[],
      fecha:normFecha(g(o,'fecha')),ruc,nombre,
      timbrado:String(g(o,'timb')||'').trim(),nfac:String(g(o,'nfac')||'').trim(),
      cdc:String(g(o,'cdc')||'').replace(/\s/g,''),
      g10:normMonto(g(o,'g10')),g5:normMonto(g(o,'g5')),ex:normMonto(g(o,'ex')),
      totalCol:(impMapa.total!=null&&impMapa.total>=0)?normMonto(g(o,'total')):null,
      /* imputación por comprobante, tal cual la trae Marangatú (SI/NO por impuesto) */
      imputa:{
        iva:esSI(g(o,'impIva')),ire:esSI(g(o,'impIre')),irp:esSI(g(o,'impIrp')),
        no:esSI(g(o,'noImp'))
      },
      seccionId:secDefault
    };
    const fc=firmaComp(comp);
    if(existentes.has(fc)){dup++;return;}   /* ya existe: no duplicar */
    existentes.add(fc);
    S.comprobantes.push(comp);n++;
  });
  save();
  /* ajustar el período al mes más frecuente de lo importado, para validar lo correcto */
  const cnt={};
  S.comprobantes.filter(c=>c.clienteId===curCli&&c.origen==='planilla').forEach(c=>{const m=(c.fecha||'').slice(0,7);if(m)cnt[m]=(cnt[m]||0)+1;});
  let mejorMes=ymSel,mx=0;for(const m in cnt){if(cnt[m]>mx){mx=cnt[m];mejorMes=m;}}
  ymSel=mejorMes;
  perSet(curCli,ymSel,{estado:'cargado'});
  toast(n+' comprobantes importados'+(dup?' · '+dup+' duplicado'+(dup>1?'s':'')+' salteado'+(dup>1?'s':''):'')+' · revisando…');
  /* VALIDACIÓN AUTOMÁTICA: apenas se importa, mostrar el semáforo con los errores */
  correrValidacion();
}

    '<div class="s"><div class="sk">Ventas</div><div class="sv">'+comps.filter(x=>x.clase==='venta').length+'</div></div>'+
    '<div class="s"><div class="sk">Vence</div><div class="sv">'+fmtDate(v).slice(0,5)+'</div></div></div></div>';

  h+='<div class="tabs"><button class="'+(cliTab==='mov'?'on':'')+'" onclick="cliTab=\'mov\';render()">Movimientos</button>'+
     '<button class="'+(cliTab==='cc'?'on':'')+'" onclick="cliTab=\'cc\';render()">Cta. corriente</button>'+
     '<button class="'+(cliTab==='libros'?'on':'')+'" onclick="cliTab=\'libros\';render()">Libros</button></div>';

  if(cliTab==='mov')h+=subMovimientos(c,comps);

function subMovimientos(c,comps){

      return '<div class="fac" style="cursor:pointer" onclick="abrirCarga(\''+x.id+'\')"><div class="ft"><div class="fp">'+dot+'<span class="clsp '+(esNC?'cl-n':(x.clase==='venta'?'cl-v':'cl-c'))+'">'+(esNC?'NC':(x.clase==='venta'?'VENTA':'COMPRA'))+'</span> '+esc(x.nombre||rucBase(x.ruc))+'</div>'+

        (esNC&&x.nfacAsoc?' · asoc. '+esc(x.nfacAsoc):'')+

}

function guardarCobro(){
  const f=S.comprobantes.find(y=>y.id===cobroDe);if(!f)return;
  const monto=normMonto($('cb_monto').value);
  if(monto<=0){toast('El monto tiene que ser mayor a cero');return;}
  if(monto>saldo(f)){toast('El monto supera el saldo ('+gs(saldo(f))+')');return;}
  S.cobros.push({id:uid(),compId:f.id,fecha:$('cb_fecha').value||hoyISO(),monto,nota:$('cb_nota').value.trim()});
  save();cobroDe=null;toast((f.clase==='venta'?'Cobro':'Pago')+' registrado');render();
}
function borrarCobro(id){if(!confirm('¿Anular este recibo?'))return;S.cobros=S.cobros.filter(x=>x.id!==id);save();render();}

/* ---------- libros imprimibles ---------- */
function subLibros(c,comps){
  const todasCompras=comps.filter(x=>x.clase==='compra'),ventas=comps.filter(x=>x.clase==='venta');
  /* meses con movimientos de este cliente, para navegar el libro sin salir */
  const mesesCli=[...new Set(S.comprobantes.filter(x=>x.clienteId===c.id).map(x=>(x.fecha||'').slice(0,7)).filter(Boolean))];
  if(!mesesCli.includes(ymSel))mesesCli.push(ymSel);
  mesesCli.sort().reverse();
  const navMes='<div class="noprint" style="display:flex;align-items:center;gap:9px;margin-bottom:12px;flex-wrap:wrap">'+
    '<span style="color:var(--muted);font-size:13px;font-weight:600">Ver mes:</span>'+
    '<select onchange="setYm(this.value)" style="padding:9px 12px;border-radius:9px;border:1px solid #cdd7cd;background:#fff;color:#12180f;font:inherit;font-size:14px;font-weight:600;cursor:pointer">'+
    mesesCli.map(m=>'<option value="'+m+'"'+(m===ymSel?' selected':'')+'>'+ymLargo(m)+'</option>').join('')+
    '</select></div>';
  /* los "No Imputar" van al REG pero NO forman parte del libro de IVA */
  const noImp=todasCompras.filter(x=>x.imputa&&x.imputa.no===true);
  const compras=todasCompras.filter(x=>!(x.imputa&&x.imputa.no===true));
  const fila=(x,esCompra)=>{
    const i10=Math.round((x.g10||0)/11),i5=Math.round((x.g5||0)/21);
    const cred=esCompra?ivaCredito(x):null;
    const tot=x.totalCol!=null?x.totalCol:((x.g10||0)+(x.g5||0)+(x.ex||0));
    return '<tr><td class="l">'+fmtDate(x.fecha)+'</td><td class="l">'+esc(x.ruc)+'</td><td class="l">'+esc(x.nombre||'')+'</td>'+
      '<td class="l">'+esc(x.nfac)+'</td><td>'+digits(x.timbrado)+'</td>'+
      '<td>'+fmtNum(x.g10||0)+'</td><td>'+fmtNum(i10)+'</td><td>'+fmtNum(x.g5||0)+'</td><td>'+fmtNum(i5)+'</td><td>'+fmtNum(x.ex||0)+'</td>'+
      (esCompra?'<td>'+fmtNum(cred.i10+cred.i5)+'</td>':'')+
      '<td>'+fmtNum(tot)+'</td></tr>';
  };
  const totales=(arr,esCompra)=>{
    const t={g10:0,i10:0,g5:0,i5:0,ex:0,cred:0,tot:0};
    arr.forEach(x=>{t.g10+=x.g10||0;t.i10+=Math.round((x.g10||0)/11);t.g5+=x.g5||0;t.i5+=Math.round((x.g5||0)/21);t.ex+=x.ex||0;
      if(esCompra){const ic=ivaCredito(x);t.cred+=ic.i10+ic.i5;}
      t.tot+=x.totalCol!=null?x.totalCol:((x.g10||0)+(x.g5||0)+(x.ex||0));});
    return '<tr class="tot"><td class="l" colspan="5">TOTALES</td><td>'+fmtNum(t.g10)+'</td><td>'+fmtNum(t.i10)+'</td><td>'+fmtNum(t.g5)+'</td><td>'+fmtNum(t.i5)+'</td><td>'+fmtNum(t.ex)+'</td>'+(esCompra?'<td>'+fmtNum(t.cred)+'</td>':'')+'<td>'+fmtNum(t.tot)+'</td></tr>';
  };
  const head=esCompra=>'<tr><th>Fecha</th><th>RUC</th><th>Razón social</th><th>Comprobante</th><th>Timbrado</th><th>Grav. 10%</th><th>IVA 10%</th><th>Grav. 5%</th><th>IVA 5%</th><th>Exentas</th>'+(esCompra?'<th>IVA crédito</th>':'')+'<th>Total</th></tr>';
  const libro=(arr,titulo,esCompra)=>'<div class="card pad" style="margin-bottom:12px">'+
    '<div class="lbtitle">'+titulo+'</div><div class="lbsub">'+esc(c.nombre)+' · RUC '+esc(c.ruc)+' · '+ymLargo(ymSel)+'</div>'+
    '<div class="scrollx"><table class="ltbl">'+head(esCompra)+
    (arr.length?arr.map(x=>fila(x,esCompra)).join('')+totales(arr,esCompra):'<tr><td colspan="'+(esCompra?12:11)+'" style="text-align:center;color:var(--muted);padding:14px">Sin movimientos</td></tr>')+
    '</table></div></div>';
  return '<div class="noprint btn-row" style="margin-top:0"><button class="btn btn-ink" onclick="window.print()">🖨 Imprimir libros</button></div>'+navMes+
    libro(compras,'LIBRO DE COMPRAS',true)+
    (noImp.length?'<div class="hint" style="margin:-4px 2px 12px">ℹ '+noImp.length+' comprobante'+(noImp.length>1?'s':'')+' marcado'+(noImp.length>1?'s':'')+' "No Imputar" (Gs. '+fmtNum(noImp.reduce((a,x)=>a+(x.totalCol!=null?x.totalCol:((x.g10||0)+(x.g5||0)+(x.ex||0))),0))+') no suma'+(noImp.length>1?'n':'')+' al libro, pero sí va'+(noImp.length>1?'n':'')+' al archivo REG.</div>':'')+
    libro(ventas,'LIBRO DE VENTAS',false)+
    '<p class="hint noprint">El IVA crédito de cada compra respeta su sección (total, proporcional o exenta). Gestioná las secciones desde Respaldo y ajustes.</p>';
}

}

function condCambia(v){
  const box=$('cuotasBox');if(!box)return;
  if(v!=='credito'){box.innerHTML='';formCuotas=[];return;}
  box.innerHTML='<div class="inline-sec"><label style="margin-bottom:8px">Plan de cuotas (opcional)</label>'+
    '<div class="row2"><div class="field" style="margin:0"><input id="cq_n" inputmode="numeric" placeholder="Cantidad (ej: 3)"></div>'+
    '<div class="field" style="margin:0"><input type="date" id="cq_v1" title="Vencimiento de la 1ª cuota"></div></div>'+
    '<button class="btn btn-ghost" style="margin-top:8px;font-size:12.5px;padding:9px" onclick="armarCuotas()">Repartir el total en cuotas</button>'+
    '<div id="cq_list" style="margin-top:8px"></div></div>';
}
function armarCuotas(){
  const n=parseInt($('cq_n').value,10)||0;
  const tot=normMonto($('cm_g10').value)+normMonto($('cm_g5').value)+normMonto($('cm_ex').value);
  if(n<1){toast('Indicá cuántas cuotas');return;}
  if(tot<=0){toast('Cargá primero los montos del comprobante');return;}
  const base=Math.floor(tot/n),resto=tot-base*n;
  const v1=$('cq_v1').value;
  formCuotas=[];
  for(let i=0;i<n;i++){
    let vto='';
    if(v1){const d=new Date(v1+'T00:00:00Z');d.setUTCMonth(d.getUTCMonth()+i);vto=d.toISOString().slice(0,10);}
    formCuotas.push({vto,monto:base+(i===0?resto:0)});
  }
  $('cq_list').innerHTML=formCuotas.map((q,i)=>'<div class="cuota"><span>Cuota '+(i+1)+(q.vto?' · vence '+fmtDate(q.vto):'')+'</span><b>'+gs(q.monto)+'</b></div>').join('');
}
/* formatea el nº de comprobante mientras se escribe: 001-001-1234567 (máx 3-3-7) */
function fmtNfac(el){
  const d=digits(el.value).slice(0,13);   /* 3+3+7 = 13 dígitos máximo */
  let out=d.slice(0,3);
  if(d.length>3)out+='-'+d.slice(3,6);
  if(d.length>6)out+='-'+d.slice(6,13);
  el.value=out;
}
/* devuelve el id de la sección con ese nombre; si no existe, la crea (crédito total) */
function resolverSeccion(nombre){
  const n=String(nombre||'').trim();
  if(!n)return S.secciones[0]?S.secciones[0].id:null;
  const ex=S.secciones.find(s=>norm(s.nombre)===norm(n));
  if(ex)return ex.id;
  const id=uid();
  S.secciones.push({id,nombre:n,trat:'total',pct:100});
  toast('Sección "'+n+'" creada (crédito total — ajustala en Respaldo si corresponde)');
  return id;
}
function guardarComp(){
  const ruc=$('cm_ruc').value.trim();
  let g10=normMonto($('cm_g10').value),g5=normMonto($('cm_g5').value),ex=normMonto($('cm_ex').value);
  let totalCol=$('cm_total')&&$('cm_total').value.trim()!==''?normMonto($('cm_total').value):null;
  if(formTipo==='nc'){g10=-Math.abs(g10);g5=-Math.abs(g5);ex=-Math.abs(ex);if(totalCol!=null)totalCol=-Math.abs(totalCol);}
  const fecha=$('cm_fecha').value;
  if(!fecha||!ruc){toast('Cargá al menos fecha y RUC');return;}
  const datos={
    clase:formClase,tipo:formTipo,cond:$('cm_cond').value,cuotas:formCuotas.slice(),
    fecha,ruc,nombre:$('cm_nom').value.trim(),
    timbrado:$('cm_timb').value.trim(),nfac:$('cm_nfac').value.trim(),
    cdc:$('cm_cdc')?$('cm_cdc').value.replace(/\s/g,''):'',
    nfacAsoc:formTipo==='nc'?($('cm_nfacA')?$('cm_nfacA').value.trim():''):'',
    timbAsoc:formTipo==='nc'?($('cm_timbA')?$('cm_timbA').value.trim():''):'',
    g10,g5,ex,totalCol,
    seccionId:(formClase==='compra'&&$('cm_sec'))?resolverSeccion($('cm_sec').value):null
  };
  /* agenda: guarda nombre y timbrado del proveedor para autollenar la próxima */
  if(datos.nombre)dirRemember(ruc,datos.nombre,{fuente:'manual',timbrado:digits(datos.timbrado)||undefined});
  if(editComp){
    const c=S.comprobantes.find(x=>x.id===editComp);
    if(c)Object.assign(c,datos);
    save();editComp=null;toast('Cambios guardados');
  }else{
    S.comprobantes.push(Object.assign({id:uid(),clienteId:curCli,totalCol:null,origen:'manual'},datos));
    save();perSet(curCli,ymSel,{estado:'cargado'});
    toast((formTipo==='nc'?'Nota de crédito':'Comprobante')+' guardado');
  }
  const volverSemaforo=(editReturn==='validar');editReturn=null;
  if(volverSemaforo){correrValidacion();}   /* re-evalúa: el corregido sale de la lista de errores */
  else{vista='cliente';cliTab='mov';render();}
}
function borrarComp(id){if(!confirm('¿Borrar este comprobante?'))return;S.comprobantes=S.comprobantes.filter(c=>c.id!==id);S.cobros=S.cobros.filter(x=>x.compId!==id);save();render();}

function vValidar(){
  const R=valRes;if(!R)return '';
  let h='';
  if(R.nBad)h+='<div class="verdict hold"><span class="ic">⛔</span><div><div class="t">Todavía no generes el REG</div><div class="d">'+R.nBad+' comprobante'+(R.nBad!==1?'s':'')+' con errores que Marangatú va a rechazar.</div></div></div>';
  else if(R.nWarn)h+='<div class="verdict caution"><span class="ic">⚠️</span><div><div class="t">Casi listo — revisá '+R.nWarn+' cosa'+(R.nWarn!==1?'s':'')+'</div><div class="d">Sin rechazos seguros, pero conviene mirar esto antes de generar.</div></div></div>';
  else h+='<div class="verdict go"><span class="ic">✅</span><div><div class="t">Período listo para generar el REG</div><div class="d">'+R.nOk+' comprobantes sin observaciones. Buen vuelo.</div></div></div>';
  h+='<div class="traffic"><div class="tl ok'+(R.nOk?'':' mute')+'"><div class="n">'+R.nOk+'</div><div class="l">Listos</div></div>'+
     '<div class="tl warn'+(R.nWarn?'':' mute')+'"><div class="n">'+R.nWarn+'</div><div class="l">A revisar</div></div>'+
     '<div class="tl bad'+(R.nBad?'':' mute')+'"><div class="n">'+R.nBad+'</div><div class="l">Rechazos</div></div></div>';
  h+='<div class="card pad" style="margin-bottom:11px"><div class="sectit" style="margin-top:0">Totales del período</div>'+
     '<div class="row2"><div class="hint">Gravadas 10%: <b class="num">'+gs(R.sum.g10)+'</b><br>Gravadas 5%: <b class="num">'+gs(R.sum.g5)+'</b><br>Exentas: <b class="num">'+gs(R.sum.ex)+'</b></div>'+
     '<div class="hint">IVA crédito 10% (según secciones): <b class="num">'+gs(R.sum.iva10cred)+'</b><br>IVA crédito 5%: <b class="num">'+gs(R.sum.iva5cred)+'</b><br>Total: <b class="num">'+gs(R.sum.tot)+'</b></div></div></div>';
  const issue=r=>{
    const f=r.f;
    const editable=f.id?' style="cursor:pointer" onclick="abrirCarga(\''+f.id+'\')"':'';
    return '<div class="issue '+r.sev+'"'+editable+'><div class="top">'+(f._fila?'<span class="fila">Fila '+f._fila+' de tu planilla</span>':'<span class="fila" style="background:var(--chip);color:var(--chip-tx)">carga manual</span>')+
      '<span class="num" style="font-weight:800">'+gs(f.totalCol!=null?f.totalCol:((f.g10||0)+(f.g5||0)+(f.ex||0)))+'</span></div>'+
      '<div class="who">'+(f.tipo==='nc'?'<span class="clsp cl-n">NC</span> ':'')+esc(f.nombre||rucBase(f.ruc)||'—')+'</div>'+
      '<div class="meta">'+fmtDate(f.fecha)+' · RUC '+esc(f.ruc||'—')+' · '+esc(f.nfac||'sin nº')+'</div>'+
      (r.flags.length?'<div class="flags">'+r.flags.map(x=>'<div class="flag '+x.sev+'"><span class="fp2">'+esc(x.tag)+'</span><span class="fx">'+x.msg+'</span></div>').join('')+'</div>':'')+
      (f.id?'<div style="margin-top:8px"><button class="linkbtn" onclick="event.stopPropagation();abrirCarga(\''+f.id+'\')">✏️ corregir este comprobante</button></div>':'')+'</div>';
  };
  const bads=R.items.filter(r=>r.sev==='bad'),warns=R.items.filter(r=>r.sev==='warn'),oks=R.items.filter(r=>r.sev==='ok');
  if(bads.length){h+='<div class="sectit bad">Van a ser rechazados <span class="cnt">'+bads.length+'</span></div>'+bads.map(issue).join('');}
  if(warns.length){h+='<div class="sectit warn">Conviene revisar <span class="cnt">'+warns.length+'</span></div>'+warns.map(issue).join('');}
  if(oks.length){
    h+='<button class="btn btn-ghost" style="margin-top:10px" onclick="showOK=!showOK;render()">'+(showOK?'Ocultar':'Ver')+' los '+oks.length+' en orden</button>';
    if(showOK)h+='<div style="margin-top:9px">'+oks.map(issue).join('')+'</div>';
  }
  h+='<div class="btn-row"><button class="btn btn-brand" onclick="descargarInforme()">⬇ Informe para corregir</button></div>';
  return h;
}

      (est?'<span class="stpill '+cls+'">'+est+'</span>':'')+
      '<span>'+fuente+'</span>'+(uso?'<span>· '+uso+' comprob.</span>':'')+
      (e.timbrado?'<span>· timb. '+esc(e.timbrado)+'</span>':'')+'</div></div></div>';
  }).join('');
  h+='<div class="hint" style="text-align:center;margin-top:12px">La edición de proveedores llega en una próxima versión. Por ahora se guardan con el dato oficial.</div>';
  return h;
}
function setProvBuscar(v){provBuscar=v;
  const el=$('app');const foco=document.activeElement===document.querySelector('.search');
  el.innerHTML=vProveedores();
  if(foco){const s=document.querySelector('.search');if(s){s.focus();s.setSelectionRange(s.value.length,s.value.length);}}

/* ============================ router ============================ */
function irTab(t){tab=t;if(t==='panel')vista=curCli?'cliente':'lista';render();}
function volver(){
  if(vista==='cliente'){vista='lista';curCli=null;cobroDe=null;}
  else if(['carga','importar','mapear','validar','exportar'].includes(vista)){vista=(editReturn==='validar')?'validar':'cliente';editComp=null;editReturn=null;}
  else vista='lista';
  render();
}
function abrirCliente(id){curCli=id;vista='cliente';cliTab='mov';cobroDe=null;render();window.scrollTo(0,0);}
function nuevoCliente(){formObl=new Set();vista='nuevoCliente';render();}
function setYm(v){if(v)ymSel=v;render();}
function setBuscar(v){buscar=v;renderLista();}
function onFile(files){
  if(!files||!files.length)return;
  const xmls=Array.from(files).filter(f=>/\.xml$/i.test(f.name||''));
  if(xmls.length){leerXMLs(xmls);return;}   /* varios XML de una: se cargan todos */
  leerArchivo(files[0]);
}
function renderLista(){
  const el=$('app');const foco=document.activeElement===document.querySelector('.search');
  el.innerHTML=vPanel();
  if(foco){const s=document.querySelector('.search');if(s){s.focus();s.setSelectionRange(s.value.length,s.value.length);}}
  bindDrop();
}
function render(){
  header();navHTML();
  let h='';
  if(tab==='vencimientos')h=vVencimientos();
  else if(tab==='proveedores')h=vProveedores();
  else if(tab==='respaldo')h=vRespaldo();
  else{
    if(vista==='lista')h=vPanel();
    else if(vista==='nuevoCliente')h=vNuevoCliente();
    else if(vista==='cliente')h=vCliente();
    else if(vista==='carga')h=vCarga();
    else if(vista==='importar')h=vImportar();
    else if(vista==='mapear')h=vMapear();
    else if(vista==='validar')h=vValidar();
    else if(vista==='exportar')h=vExportar();
  }
  $('app').innerHTML=h;
  bindDrop();
}
function bindDrop(){
  const dz=$('drop');if(!dz)return;
  ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('over');}));
  ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('over');}));
  dz.addEventListener('drop',e=>{if(e.dataTransfer.files.length)onFile(e.dataTransfer.files);});
}

Object.assign(window,{irTab,volver,abrirCliente,nuevoCliente,guardarCliente,toggleObl,setYm,setBuscar,onFile,cargarDemo,

  borrarComp,borrarCliente,guardarCobro,borrarCobro,traerRUC,autoRUC,autoNombre,importarFilas,fmtNfac,
  agregarSeccion,borrarSeccion,bajarRespaldo,subirRespaldo,borrarTodo,setProvBuscar,salir});

/* ============================ ARRANQUE EN LA NUBE ============================ */
async function boot(){
  // 1) Portero: exige sesi\u00f3n iniciada en OrbePy
  let session=null;
  try{ const r=await sb.auth.getSession(); session=r.data.session; }catch(e){}
  if(!session){ location.href='app.html'; return; }

  // 2) Resolver el estudio (cuenta) del usuario
  try{
    const {data:mem,error}=await sb.from('members').select('account_id').limit(1);
    if(error) throw error;
    if(!mem||!mem.length){
      document.getElementById('app').innerHTML='<div style="padding:40px 20px;text-align:center;color:#5E7684">No encontramos tu estudio.<br><br><button onclick="salir()" style="background:#0FA79A;color:#fff;border:none;padding:10px 16px;border-radius:9px;cursor:pointer;font:inherit">Volver al port\u00f3n</button></div>';
      return;
    }
    ACCOUNT_ID=mem[0].account_id;
  }catch(e){
    document.getElementById('app').innerHTML='<div style="padding:40px 20px;text-align:center;color:#C0392B">No se pudo conectar con la nube. Revis\u00e1 tu internet y record\u00e1 la p\u00e1gina.</div>';
    return;
  }

  // 2.5) Verificar que el acceso del estudio est\u00e9 habilitado
  try{
    const {data:sub}=await sb.from('subscriptions').select('status').eq('account_id',ACCOUNT_ID).maybeSingle();
    if(sub && sub.status==='inactive'){
      document.getElementById('app').innerHTML='<div style="padding:52px 22px;text-align:center;max-width:440px;margin:0 auto">'
        +'<div style="font-size:42px;margin-bottom:14px">\ud83d\udd12</div>'
        +'<h2 style="font-family:\'Sora\',sans-serif;color:#12180f;font-size:21px;margin-bottom:10px">Acceso en pausa</h2>'
        +'<p style="color:#5E7684;font:15px/1.6 sans-serif;margin-bottom:24px">Tu acceso a orbe tributa est\u00e1 pausado. Si ya hiciste el pago o quer\u00e9s reactivarlo, escribinos y lo habilitamos enseguida.</p>'
        +'<a href="mailto:josecabreraroman91@gmail.com" style="display:inline-block;background:#0FA79A;color:#fff;text-decoration:none;padding:11px 18px;border-radius:9px;font:600 14px \'Sora\',sans-serif;margin-right:8px">Contactar</a>'
        +'<button onclick="salir()" style="background:none;border:1px solid #d5dbcb;color:#5E7684;padding:11px 18px;border-radius:9px;cursor:pointer;font:14px sans-serif">Salir</button>'
        +'</div>';
      return;
    }
  }catch(e){ /* si no se puede leer el estado, no bloqueamos el ingreso */ }

  // 3) Traer los datos del estudio desde la nube
  try{
    const {data:row}=await sb.from('contable_datos').select('data').eq('account_id',ACCOUNT_ID).maybeSingle();
    S = (row&&row.data&&row.data.clientes) ? normalizar(row.data) : estadoInicial();
  }catch(e){ S=estadoInicial(); }

  // 4) Mostrar la app
  render();
}
boot();
</script>
