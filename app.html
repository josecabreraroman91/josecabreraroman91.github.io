<style>
  :root{
    --bg-0:#070a07;
    --bg-1:#0d130d;
    --surface:#121a12;
    --surface-2:#18221844;
    --surface-solid:#18211a;
    --line:rgba(196,242,77,.10);
    --line-strong:rgba(196,242,77,.22);
    --txt:#eef4e8;
    --txt-dim:#9bab92;
    --txt-faint:#66755e;
    --lime:#c4f24d;
    --lime-soft:#d6f97e;
    --lime-deep:#a6d92f;
    --danger:#ff8f8f;
    --ok:#bef25a;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--txt);
    background:
      radial-gradient(1100px 760px at 80% -12%, rgba(196,242,77,.14), transparent 58%),
      radial-gradient(900px 640px at 8% 112%, rgba(166,217,47,.08), transparent 55%),
      linear-gradient(160deg,var(--bg-0),var(--bg-1));
    min-height:100dvh;
    display:grid;
    place-items:center;
    padding:24px;
    overflow-x:hidden;
  }

  .stage{width:100%;max-width:420px;position:relative;z-index:1}

  /* ---- Brand / logo signature ---- */
  .brand{display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:30px}
  .orbe{position:relative;width:104px;height:104px;display:grid;place-items:center}
  .orbe__logo{
    width:62px;height:62px;object-fit:contain;
    position:relative;z-index:2;
    filter:drop-shadow(0 0 14px rgba(196,242,77,.55));
    animation:breathe 3.6s ease-in-out infinite;
  }
  .orbe__ring{
    position:absolute;border-radius:50%;
    border:1.5px solid transparent;
    border-top-color:rgba(196,242,77,.55);
    border-left-color:rgba(196,242,77,.18);
    animation:spin 8s linear infinite;
  }
  .orbe__ring.one{inset:0}
  .orbe__ring.two{
    inset:16px;
    border-top-color:rgba(214,249,126,.4);
    border-right-color:rgba(214,249,126,.12);
    animation-duration:5s;animation-direction:reverse;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes breathe{
    0%,100%{filter:drop-shadow(0 0 12px rgba(196,242,77,.45)) }
    50%{filter:drop-shadow(0 0 22px rgba(196,242,77,.75)) }
  }

  .wordmark{
    font-family:'Sora',sans-serif;font-weight:700;font-size:30px;letter-spacing:.02em;
    background:linear-gradient(90deg,#eaf7cf,var(--lime) 60%,var(--lime-deep));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-align:center;
  }
  .wordmark small{
    display:block;-webkit-text-fill-color:var(--txt-faint);color:var(--txt-faint);
    font-family:'Inter',sans-serif;font-weight:500;font-size:12px;letter-spacing:.2em;
    text-transform:uppercase;text-align:center;margin-top:8px;
  }

  /* ---- Card ---- */
  .card{
    background:linear-gradient(180deg,var(--surface),#0e150e);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:28px 26px 30px;box-shadow:0 24px 60px -22px rgba(0,0,0,.75);
  }
  .card__title{font-family:'Sora',sans-serif;font-weight:600;font-size:20px;margin-bottom:4px}
  .card__sub{color:var(--txt-dim);font-size:14px;margin-bottom:22px}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:500;color:var(--txt-dim);margin-bottom:7px}
  .field input{
    width:100%;background:var(--bg-0);border:1px solid var(--line-strong);
    border-radius:11px;padding:13px 14px;color:var(--txt);font-size:15px;font-family:inherit;
    transition:border-color .15s, box-shadow .15s;
  }
  .field input::placeholder{color:var(--txt-faint)}
  .field input:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(196,242,77,.22)}

  .btn{
    width:100%;border:none;border-radius:11px;padding:14px;
    font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#0c1206;cursor:pointer;
    background:linear-gradient(92deg,var(--lime-soft),var(--lime) 55%,var(--lime-deep));
    transition:filter .15s, transform .05s;
  }
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.6;cursor:not-allowed;filter:none}
  .btn:focus-visible{outline:2px solid #fff;outline-offset:2px}

  .switch{text-align:center;margin-top:18px;font-size:14px;color:var(--txt-dim)}
  .switch button{background:none;border:none;color:var(--lime);font:inherit;font-weight:600;cursor:pointer;padding:2px 4px}
  .switch button:hover{text-decoration:underline}
  .switch button:focus-visible{outline:2px solid var(--lime);outline-offset:2px;border-radius:4px}
  .terms{margin-bottom:16px}
  .terms__lbl{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;color:var(--txt-dim);cursor:pointer;line-height:1.5}
  .terms__lbl input{margin-top:2px;width:16px;height:16px;accent-color:var(--lime);flex-shrink:0;cursor:pointer}
  .terms__lbl a{color:var(--lime);font-weight:500}
  .terms__lbl a:hover{text-decoration:underline}

  .msg{font-size:13.5px;line-height:1.5;border-radius:10px;padding:11px 13px;margin-bottom:18px;display:none}
  .msg.show{display:block}
  .msg.error{background:rgba(255,143,143,.10);border:1px solid rgba(255,143,143,.3);color:var(--danger)}
  .msg.ok{background:rgba(196,242,77,.12);border:1px solid rgba(196,242,77,.32);color:var(--ok)}

  .foot{text-align:center;margin-top:26px;font-size:12px;color:var(--txt-faint);letter-spacing:.02em}

  /* ---- Logged-in view ---- */
  .home{display:none}
  .home.show{display:block}
  .auth.hide{display:none}
  .home__bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}
  .home__id{display:flex;align-items:center;gap:12px;min-width:0}
  .dot{
    width:40px;height:40px;border-radius:50%;flex-shrink:0;padding:7px;
    background:var(--surface-solid);border:1px solid var(--line-strong);
    display:grid;place-items:center;
  }
  .dot img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 6px rgba(196,242,77,.5))}
  .home__id .who{font-size:13px;color:var(--txt-dim);line-height:1.3;min-width:0}
  .home__id .who b{display:block;color:var(--txt);font-weight:600;font-size:14px;word-break:break-all}
  .linkbtn{
    background:none;border:1px solid var(--line-strong);color:var(--txt-dim);
    border-radius:9px;padding:8px 12px;font:inherit;font-size:13px;cursor:pointer;
    transition:border-color .15s,color .15s;flex-shrink:0;
  }
  .linkbtn:hover{border-color:var(--lime);color:var(--txt)}
  .linkbtn:focus-visible{outline:2px solid var(--lime);outline-offset:2px}

  .home__title{font-family:'Sora',sans-serif;font-weight:600;font-size:18px;margin-bottom:16px}
  .product{
    display:flex;align-items:center;gap:14px;background:var(--surface-solid);
    border:1px solid var(--line);border-radius:13px;padding:16px;
  }
  .product__ic{
    width:44px;height:44px;border-radius:11px;display:grid;place-items:center;
    background:linear-gradient(140deg,rgba(196,242,77,.20),rgba(166,217,47,.10));
    border:1px solid var(--line);font-size:20px;flex-shrink:0;
  }
  .product__tx{flex:1;min-width:0}
  .product__tx h3{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;margin-bottom:3px}
  .product__tx p{font-size:12.5px;color:var(--txt-dim)}
  .badge{
    font-size:11px;font-weight:600;padding:5px 9px;border-radius:20px;
    background:rgba(196,242,77,.14);color:var(--lime);border:1px solid rgba(196,242,77,.3);
    white-space:nowrap;flex-shrink:0;
  }
  .product__go{
    font-family:'Sora',sans-serif;font-size:13px;font-weight:600;
    padding:9px 15px;border-radius:10px;text-decoration:none;
    color:#0c1206;white-space:nowrap;flex-shrink:0;cursor:pointer;
    background:linear-gradient(92deg,var(--lime-soft),var(--lime) 60%,var(--lime-deep));
    transition:filter .15s,transform .05s;
  }
  .product__go:hover{filter:brightness(1.06)}
  .product__go:active{transform:translateY(1px)}
  .product__go:focus-visible{outline:2px solid #fff;outline-offset:2px}
  .product{transition:border-color .15s}
  .product:hover{border-color:var(--line-strong)}

  @media (prefers-reduced-motion: reduce){
    .orbe__ring{animation:none}
    .orbe__logo{animation:none;filter:drop-shadow(0 0 14px rgba(196,242,77,.55))}
  }
  @media (max-width:440px){
    .card{padding:24px 20px 26px}
    .wordmark{font-size:26px}
  }
</style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ---- Conexión a tu proyecto Supabase ----
    const SUPABASE_URL = "https://udmulzlkseeecugangbs.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LlKL-0Gp2IQVmoslwDOYmQ_LVL1mq4K";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const authCard  = document.getElementById('authCard');
    const homeCard  = document.getElementById('homeCard');
    const form      = document.getElementById('authForm');
    const emailEl   = document.getElementById('email');
    const passEl    = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const switchBtn = document.getElementById('switchBtn');
    const switchLine= document.getElementById('switchLine');
    const formTitle = document.getElementById('formTitle');
    const formSub   = document.getElementById('formSub');
    const msg       = document.getElementById('msg');
    const userEmail = document.getElementById('userEmail');
    const logoutBtn = document.getElementById('logoutBtn');

    let mode = 'login';

    function showMsg(text, type){ msg.textContent = text; msg.className = 'msg show ' + type; }
    function clearMsg(){ msg.className = 'msg'; msg.textContent = ''; }

    function setMode(next){
      mode = next; clearMsg();
      if(mode === 'signup'){
        formTitle.textContent = 'Creá tu cuenta';
        formSub.textContent   = 'Registrate para empezar a usar OrbePy.';
        submitBtn.textContent = 'Crear cuenta';
        passEl.setAttribute('autocomplete','new-password');
        switchLine.childNodes[0].textContent = '¿Ya tenés cuenta? ';
        switchBtn.textContent = 'Iniciá sesión';
        document.getElementById('termsField').style.display = 'block';
      }else{
        formTitle.textContent = 'Ingresá a tu cuenta';
        formSub.textContent   = 'Accedé a tus herramientas de trabajo.';
        submitBtn.textContent = 'Iniciar sesión';
        passEl.setAttribute('autocomplete','current-password');
        switchLine.childNodes[0].textContent = '¿Todavía no tenés cuenta? ';
        switchBtn.textContent = 'Creá una';
        document.getElementById('termsField').style.display = 'none';
        document.getElementById('terms').checked = false;
      }
    }
    switchBtn.addEventListener('click', ()=> setMode(mode === 'login' ? 'signup' : 'login'));

    function traducir(errMsg){
      const m = (errMsg || '').toLowerCase();
      if(m.includes('invalid login credentials')) return 'Correo o contraseña incorrectos.';
      if(m.includes('email not confirmed'))       return 'Todavía no confirmaste tu correo. Revisá tu bandeja de entrada.';
      if(m.includes('user already registered') || m.includes('already been registered')) return 'Ese correo ya está registrado. Probá iniciar sesión.';
      if(m.includes('password should be at least')) return 'La contraseña tiene que tener al menos 6 caracteres.';
      if(m.includes('unable to validate email') || m.includes('invalid email')) return 'Ese correo no parece válido.';
      if(m.includes('rate limit') || m.includes('too many')) return 'Demasiados intentos. Esperá un momento y probá de nuevo.';
      return errMsg || 'Algo salió mal. Probá de nuevo.';
    }

    function mostrarHome(session){
      userEmail.textContent = session.user.email;
      authCard.classList.add('hide');
      homeCard.classList.add('show');
    }
    function mostrarAuth(){
      homeCard.classList.remove('show');
      authCard.classList.remove('hide');
    }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault(); clearMsg();
      const email = emailEl.value.trim();
      const password = passEl.value;
      if(!email || !password){ showMsg('Completá el correo y la contraseña.', 'error'); return; }
      if(mode === 'signup' && !document.getElementById('terms').checked){
        showMsg('Necesitás aceptar los términos para crear tu cuenta.', 'error'); return;
      }

      submitBtn.disabled = true;
      const original = submitBtn.textContent;
      submitBtn.textContent = mode === 'signup' ? 'Creando…' : 'Ingresando…';

      try{
        if(mode === 'signup'){
          const { data, error } = await sb.auth.signUp({ email, password });
          if(error){ showMsg(traducir(error.message), 'error'); }
          else if(data.session){ mostrarHome(data.session); }
          else{
            showMsg('¡Listo! Te enviamos un correo a ' + email + ' para confirmar tu cuenta. Confirmalo y después iniciá sesión.', 'ok');
            setMode('login');
          }
        }else{
          const { data, error } = await sb.auth.signInWithPassword({ email, password });
          if(error){ showMsg(traducir(error.message), 'error'); }
          else if(data.session){ mostrarHome(data.session); }
        }
      }catch(err){
        showMsg('No se pudo conectar. Revisá tu internet y probá de nuevo.', 'error');
      }finally{
        submitBtn.disabled = false;
        submitBtn.textContent = original;
      }
    });

    logoutBtn.addEventListener('click', async ()=>{
      logoutBtn.disabled = true;
      await sb.auth.signOut();
      passEl.value = '';
      mostrarAuth(); setMode('login');
      logoutBtn.disabled = false;
    });

    (async ()=>{
      const { data } = await sb.auth.getSession();
      if(data.session){ mostrarHome(data.session); return; }
      if(location.search.includes('registro') || location.hash.includes('registro')){ setMode('signup'); }
    })();
  </script>
</body>
</html>
