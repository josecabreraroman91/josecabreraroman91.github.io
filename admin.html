<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#070a07;--bg-1:#0d130d;--surface:#121a12;--surface-2:#18211a;
    --line:rgba(196,242,77,.12);--line-strong:rgba(196,242,77,.22);
    --txt:#eef4e8;--txt-dim:#9bab92;--txt-faint:#66755e;
    --lime:#c4f24d;--lime-deep:#a6d92f;
    --on:#c4f24d;--off:#ff8f8f;--warn:#f2c94c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--txt);
    background:radial-gradient(1000px 700px at 90% -15%,rgba(196,242,77,.10),transparent 60%),linear-gradient(160deg,var(--bg-0),var(--bg-1));
    min-height:100dvh;padding:24px 18px 60px}
  .wrap{max-width:900px;margin:0 auto}

  header{display:flex;align-items:center;gap:13px;margin-bottom:8px}
  header img{width:40px;height:40px;filter:drop-shadow(0 0 10px rgba(196,242,77,.5))}
  header .t{font-family:'Sora',sans-serif;font-weight:700;font-size:20px}
  header .t small{display:block;font-family:'Inter';font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--lime);margin-bottom:3px}
  header .sp{flex:1}
  .out{background:none;border:1px solid var(--line-strong);color:var(--txt-dim);border-radius:9px;padding:8px 12px;font:inherit;font-size:13px;cursor:pointer}
  .out:hover{color:var(--txt);border-color:var(--lime)}

  .sub{color:var(--txt-dim);font-size:14px;margin:6px 0 22px}

  .bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;background:var(--bg-0);border:1px solid var(--line-strong);border-radius:10px;padding:11px 13px;color:var(--txt);font:inherit;font-size:14px}
  .search:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(196,242,77,.2)}
  .stat{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--txt-dim);white-space:nowrap}
  .stat b{color:var(--lime);font-family:'Sora',sans-serif}

  .card{background:linear-gradient(180deg,var(--surface),#0e150e);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .row{display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;padding:15px 18px;border-top:1px solid var(--line)}
  .row:first-child{border-top:none}
  .row__info{min-width:0}
  .row__info h3{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row__info p{font-size:12.5px;color:var(--txt-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row__info .mail{color:var(--txt-faint)}

  .badge{font-family:'Sora',sans-serif;font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;white-space:nowrap;text-align:center;min-width:78px}
  .badge.active{background:rgba(196,242,77,.14);color:var(--lime);border:1px solid rgba(196,242,77,.32)}
  .badge.inactive{background:rgba(255,143,143,.12);color:var(--off);border:1px solid rgba(255,143,143,.3)}
  .badge.trial{background:rgba(242,201,76,.12);color:var(--warn);border:1px solid rgba(242,201,76,.3)}

  .toggle{border:none;border-radius:10px;padding:9px 15px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;min-width:104px;transition:filter .15s,transform .05s}
  .toggle:active{transform:translateY(1px)}
  .toggle:disabled{opacity:.55;cursor:default}
  .toggle.enable{background:linear-gradient(92deg,#d6f97e,var(--lime) 60%,var(--lime-deep));color:#0c1206}
  .toggle.disable{background:rgba(255,143,143,.14);color:var(--off);border:1px solid rgba(255,143,143,.35)}
  .toggle:hover:not(:disabled){filter:brightness(1.07)}

  .msg{text-align:center;padding:44px 20px;color:var(--txt-dim);font-size:14.5px}
  .msg.err{color:var(--off)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--surface-2);border:1px solid var(--line-strong);color:var(--txt);padding:12px 20px;border-radius:12px;font-size:14px;box-shadow:0 14px 40px rgba(0,0,0,.5);transition:transform .25s;z-index:50}
  .toast.show{transform:translateX(-50%) translateY(0)}

  @media(max-width:560px){
    .row{grid-template-columns:1fr auto;grid-template-areas:"info status" "info toggle"}

      <div class="t"><small>OrbePy</small>Panel de administración</div>
      <div class="sp"></div>
      <button class="out" id="out">Salir</button>
    </header>
    <p class="sub">Habilitá o cortá el acceso de cada estudio. Los cambios se aplican al instante.</p>

    <div class="bar">
      <input class="search" id="q" placeholder="Buscar por estudio o correo…">
      <div class="stat">Activos: <b id="cActive">—</b> · Total: <b id="cTotal">—</b></div>
    </div>

    <div class="card" id="list"><div class="msg" id="loading">Cargando estudios…</div></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SB_URL="https://udmulzlkseeecugangbs.supabase.co";
    const SB_KEY="sb_publishable_LlKL-0Gp2IQVmoslwDOYmQ_LVL1mq4K";
    const sb=window.supabase.createClient(SB_URL,SB_KEY);

    const $=id=>document.getElementById(id);
    let estudios=[];

    function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

    function badge(status){
      const map={active:['active','Activo'],inactive:['inactive','Cortado'],trial:['trial','Prueba']};
      const [cls,txt]=map[status]||['trial',status||'—'];
      return '<span class="badge '+cls+'">'+txt+'</span>';
    }

    function render(){
      const q=$('q').value.trim().toLowerCase();
      const items=estudios.filter(e=>!q||(e.estudio||'').toLowerCase().includes(q)||(e.owner_email||'').toLowerCase().includes(q));
      const total=estudios.length;
      const activos=estudios.filter(e=>e.status==='active').length;
      $('cActive').textContent=activos;$('cTotal').textContent=total;

      if(!items.length){$('list').innerHTML='<div class="msg">No hay estudios que coincidan.</div>';return;}
      $('list').innerHTML=items.map(e=>{
        const on=e.status==='active';
        const btn=on
          ? '<button class="toggle disable" onclick="cambiar(\''+e.account_id+'\',\'inactive\')">Cortar acceso</button>'
          : '<button class="toggle enable" onclick="cambiar(\''+e.account_id+'\',\'active\')">Habilitar</button>';
        return '<div class="row"><div class="row__info"><h3>'+esc(e.estudio||'(sin nombre)')+'</h3>'
          +'<p class="mail">'+esc(e.owner_email||'sin dueño')+'</p></div>'
          +badge(e.status)+btn+'</div>';
      }).join('');
    }
    function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

    async function cambiar(accountId,nuevo){
      const e=estudios.find(x=>x.account_id===accountId);const previo=e?e.status:null;
      if(e)e.status=nuevo; render();
      const {error}=await sb.from('subscriptions').update({status:nuevo}).eq('account_id',accountId);
      if(error){ if(e)e.status=previo; render(); toast('No se pudo actualizar. Probá de nuevo.'); }
      else{ toast(nuevo==='active'?'Acceso habilitado ✓':'Acceso cortado'); }
    }
    window.cambiar=cambiar;

    async function cargar(){
      const {data,error}=await sb.rpc('admin_estudios');
      if(error){ $('list').innerHTML='<div class="msg err">No se pudo cargar. ¿Tu usuario es administrador?</div>'; return; }
      estudios=data||[]; render();
    }

    $('q').addEventListener('input',render);
    $('out').addEventListener('click',async()=>{ await sb.auth.signOut(); location.href='index.html'; });

    (async()=>{
      const {data:{session}}=await sb.auth.getSession();
      if(!session){ location.href='index.html'; return; }
      const {data:admin}=await sb.rpc('es_admin');
      if(!admin){ $('list').innerHTML='<div class="msg err">Esta página es solo para administradores.</div>'; return; }
      cargar();
    })();
  </script>
</body>
